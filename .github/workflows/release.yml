name: Release

on:
  push:
    tags:
      - "atom_log-v*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    # Match CI: 26.04 has a modern toolchain. Dist does not need SDL3.
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Parse tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          LIB="${TAG%-v*}"
          VER="${TAG##*-v}"
          FILE_VER=$(tr -d '[:space:]' < "src/${LIB}/VERSION")
          if [ "$VER" != "$FILE_VER" ]; then
            echo "Tag version $VER != VERSION file $FILE_VER"
            exit 1
          fi
          echo "lib=$LIB" >> "$GITHUB_OUTPUT"
          echo "ver=$VER" >> "$GITHUB_OUTPUT"
      - name: Build dist
        run: bundle exec rake "dist:${{ steps.meta.outputs.lib }}"
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ steps.meta.outputs.lib }}.h
          generate_release_notes: true

  # Same workflow as manual "Docs" runs (workflow_dispatch).
  docs:
    needs: release
    uses: ./.github/workflows/docs.yml
    permissions:
      contents: read
      pages: write
      id-token: write
