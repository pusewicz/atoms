name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Pin SDL3 for reproducible CI (setup-sdl also accepts 3-latest).
  SDL3_VERSION: "3.4.12"

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu 26.04 image: GCC 15.2 (default), Clang 20–22, CMake, Ninja,
          # pkg-config preinstalled. See:
          # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2604-Readme.md
          - name: ubuntu-clang
            os: ubuntu-26.04
            cc: clang
          - name: ubuntu-gcc
            os: ubuntu-26.04
            cc: gcc
          - name: macos-clang
            os: macos-latest
            cc: clang
          # C23 on Windows via LLVM clang (MSVC lacks full C23 / our GNU attrs).
          - name: windows-clang
            os: windows-latest
            cc: clang

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      # ubuntu-26.04 already has gcc 15, clang, cmake, ninja, pkg-config.
      # Keep a no-op-friendly install for any missing bits after image churn.
      - name: Ensure Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang gcc pkg-config cmake ninja-build

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install llvm -y --no-progress
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # Official action: build/install SDL from source (cached). Works on
      # Linux/macOS/Windows. https://github.com/libsdl-org/setup-sdl
      - name: Setup SDL3
        id: sdl
        uses: libsdl-org/setup-sdl@v1
        with:
          version: ${{ env.SDL3_VERSION }}
          install-linux-dependencies: true
          add-to-environment: true
          build-type: Release

      - name: Export SDL3_DIR for Rake
        run: |
          echo "SDL3_DIR=${{ steps.sdl.outputs.prefix }}" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=${{ steps.sdl.outputs.prefix }}" >> "$GITHUB_ENV"
          # pkg-config lookup when the install laid down .pc files
          for d in \
            "${{ steps.sdl.outputs.prefix }}/lib/pkgconfig" \
            "${{ steps.sdl.outputs.prefix }}/lib64/pkgconfig" \
            "${{ steps.sdl.outputs.prefix }}/share/pkgconfig"
          do
            if [[ -d "$d" ]]; then
              echo "PKG_CONFIG_PATH=${d}${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> "$GITHUB_ENV"
              break
            fi
          done
          echo "SDL version: ${{ steps.sdl.outputs.version }}"
          echo "SDL prefix:  ${{ steps.sdl.outputs.prefix }}"
          ls -la "${{ steps.sdl.outputs.prefix }}" || true

      - name: Show toolchain
        env:
          CC: ${{ matrix.cc }}
        run: |
          echo "CC=$CC"
          command -v "$CC"
          "$CC" --version
          ruby -v
          echo "SDL3_DIR=${SDL3_DIR:-}"
          pkg-config --modversion sdl3 2>/dev/null || true

      - name: version:check
        run: bundle exec rake version:check

      - name: test
        env:
          CC: ${{ matrix.cc }}
        run: bundle exec rake test
