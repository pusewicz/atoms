name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Install SDL3 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl3-dev pkg-config
      - name: Install SDL3 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl3 pkg-config
      - name: version:check
        run: bundle exec rake version:check
      - name: test
        run: bundle exec rake test
      - name: docs:check
        run: bundle exec rake docs:check
