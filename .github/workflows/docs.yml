name: Docs

# Deploy the static docs site to GitHub Pages.
# - Manual: Actions → Docs → Run workflow
# - Release: called from release.yml after publishing a library tag
on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; do not cancel an in-flight production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  docs:
    runs-on: ubuntu-26.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build docs
        run: bundle exec rake docs:check && bundle exec rake docs

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/docs

      - name: Deploy pages
        id: deployment
        uses: actions/deploy-pages@v5
